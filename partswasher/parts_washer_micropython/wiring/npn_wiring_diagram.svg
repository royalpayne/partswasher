<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 680" font-family="monospace" font-size="12">
  <style>
    .title { font-size: 16px; font-weight: bold; }
    .label { font-size: 11px; }
    .pin { font-size: 10px; }
    .note { font-size: 10px; fill: #666; }
    .wire-pul { stroke: #e44; stroke-width: 2.5; fill: none; }
    .wire-dir { stroke: #44e; stroke-width: 2.5; fill: none; }
    .wire-5v { stroke: #e80; stroke-width: 2.5; fill: none; }
    .wire-gnd { stroke: #333; stroke-width: 2.5; fill: none; }
  </style>

  <text x="475" y="25" text-anchor="middle" class="title">NPN Transistor Breadboard Layout — TB6600 Step/Dir</text>

  <!-- ==================== BREADBOARD ==================== -->
  <rect x="150" y="45" width="520" height="380" rx="6" fill="#f5f0e0" stroke="#999" stroke-width="2"/>
  <text x="410" y="65" text-anchor="middle" font-weight="bold" class="label">BREADBOARD</text>

  <!-- Power rail top: + (red) -->
  <rect x="165" y="75" width="490" height="10" rx="2" fill="#fee0e0" stroke="#c99"/>
  <text x="158" y="84" text-anchor="end" class="pin" fill="#e00">+</text>
  <!-- Power rail top: - (blue) -->
  <rect x="165" y="89" width="490" height="10" rx="2" fill="#d0d0fe" stroke="#99c"/>
  <text x="158" y="98" text-anchor="end" class="pin" fill="#00e">−</text>

  <!-- Power rail bottom: + (red) -->
  <rect x="165" y="388" width="490" height="10" rx="2" fill="#fee0e0" stroke="#c99"/>
  <text x="158" y="397" text-anchor="end" class="pin" fill="#e00">+</text>
  <!-- Power rail bottom: - (blue) -->
  <rect x="165" y="402" width="490" height="10" rx="2" fill="#d0d0fe" stroke="#99c"/>
  <text x="158" y="411" text-anchor="end" class="pin" fill="#00e">−</text>

  <!-- Row labels left side -->
  <text x="172" y="125" class="pin" fill="#888">a</text>
  <text x="172" y="150" class="pin" fill="#888">b</text>
  <text x="172" y="175" class="pin" fill="#888">c</text>
  <text x="172" y="200" class="pin" fill="#888">d</text>
  <text x="172" y="225" class="pin" fill="#888">e</text>

  <!-- Center gap -->
  <rect x="180" y="236" width="475" height="8" rx="1" fill="#e8e0d0"/>

  <text x="172" y="262" class="pin" fill="#888">f</text>
  <text x="172" y="287" class="pin" fill="#888">g</text>
  <text x="172" y="312" class="pin" fill="#888">h</text>
  <text x="172" y="337" class="pin" fill="#888">i</text>
  <text x="172" y="362" class="pin" fill="#888">j</text>

  <!-- Column numbers -->
  <text x="220" y="113" text-anchor="middle" class="pin" fill="#888">5</text>
  <text x="260" y="113" text-anchor="middle" class="pin" fill="#888">7</text>
  <text x="300" y="113" text-anchor="middle" class="pin" fill="#888">9</text>
  <text x="340" y="113" text-anchor="middle" class="pin" fill="#888">11</text>
  <text x="380" y="113" text-anchor="middle" class="pin" fill="#888">13</text>
  <text x="420" y="113" text-anchor="middle" class="pin" fill="#888">15</text>
  <text x="460" y="113" text-anchor="middle" class="pin" fill="#888">17</text>
  <text x="500" y="113" text-anchor="middle" class="pin" fill="#888">19</text>
  <text x="540" y="113" text-anchor="middle" class="pin" fill="#888">21</text>

  <!-- Hole dots (key columns) -->
  <g fill="#bbb" opacity="0.4">
    <circle cx="220" cy="122" r="2"/><circle cx="220" cy="147" r="2"/><circle cx="220" cy="172" r="2"/><circle cx="220" cy="197" r="2"/><circle cx="220" cy="222" r="2"/>
    <circle cx="260" cy="122" r="2"/><circle cx="260" cy="147" r="2"/><circle cx="260" cy="172" r="2"/><circle cx="260" cy="197" r="2"/><circle cx="260" cy="222" r="2"/>
    <circle cx="300" cy="122" r="2"/><circle cx="300" cy="147" r="2"/><circle cx="300" cy="172" r="2"/><circle cx="300" cy="197" r="2"/><circle cx="300" cy="222" r="2"/>
    <circle cx="340" cy="122" r="2"/><circle cx="340" cy="147" r="2"/><circle cx="340" cy="172" r="2"/><circle cx="340" cy="197" r="2"/><circle cx="340" cy="222" r="2"/>
    <circle cx="380" cy="122" r="2"/><circle cx="380" cy="147" r="2"/><circle cx="380" cy="172" r="2"/><circle cx="380" cy="197" r="2"/><circle cx="380" cy="222" r="2"/>
    <circle cx="420" cy="122" r="2"/><circle cx="420" cy="147" r="2"/><circle cx="420" cy="172" r="2"/><circle cx="420" cy="197" r="2"/><circle cx="420" cy="222" r="2"/>
    <circle cx="460" cy="122" r="2"/><circle cx="460" cy="147" r="2"/><circle cx="460" cy="172" r="2"/><circle cx="460" cy="197" r="2"/><circle cx="460" cy="222" r="2"/>
    <circle cx="500" cy="122" r="2"/><circle cx="500" cy="147" r="2"/><circle cx="500" cy="172" r="2"/><circle cx="500" cy="197" r="2"/><circle cx="500" cy="222" r="2"/>
    <circle cx="540" cy="122" r="2"/><circle cx="540" cy="147" r="2"/><circle cx="540" cy="172" r="2"/><circle cx="540" cy="197" r="2"/><circle cx="540" cy="222" r="2"/>
    <circle cx="220" cy="259" r="2"/><circle cx="220" cy="284" r="2"/><circle cx="220" cy="309" r="2"/><circle cx="220" cy="334" r="2"/><circle cx="220" cy="359" r="2"/>
    <circle cx="260" cy="259" r="2"/><circle cx="260" cy="284" r="2"/><circle cx="260" cy="309" r="2"/><circle cx="260" cy="334" r="2"/><circle cx="260" cy="359" r="2"/>
    <circle cx="300" cy="259" r="2"/><circle cx="300" cy="284" r="2"/><circle cx="300" cy="309" r="2"/><circle cx="300" cy="334" r="2"/><circle cx="300" cy="359" r="2"/>
    <circle cx="340" cy="259" r="2"/><circle cx="340" cy="284" r="2"/><circle cx="340" cy="309" r="2"/><circle cx="340" cy="334" r="2"/><circle cx="340" cy="359" r="2"/>
    <circle cx="380" cy="259" r="2"/><circle cx="380" cy="284" r="2"/><circle cx="380" cy="309" r="2"/><circle cx="380" cy="334" r="2"/><circle cx="380" cy="359" r="2"/>
    <circle cx="420" cy="259" r="2"/><circle cx="420" cy="284" r="2"/><circle cx="420" cy="309" r="2"/><circle cx="420" cy="334" r="2"/><circle cx="420" cy="359" r="2"/>
    <circle cx="460" cy="259" r="2"/><circle cx="460" cy="284" r="2"/><circle cx="460" cy="309" r="2"/><circle cx="460" cy="334" r="2"/><circle cx="460" cy="359" r="2"/>
    <circle cx="500" cy="259" r="2"/><circle cx="500" cy="284" r="2"/><circle cx="500" cy="309" r="2"/><circle cx="500" cy="334" r="2"/><circle cx="500" cy="359" r="2"/>
    <circle cx="540" cy="259" r="2"/><circle cx="540" cy="284" r="2"/><circle cx="540" cy="309" r="2"/><circle cx="540" cy="334" r="2"/><circle cx="540" cy="359" r="2"/>
  </g>

  <!-- ==================== Q1 (PUL) — cols 9, 10, 11 rows c-d ==================== -->
  <!-- Package body spanning rows c-d, flat side facing right -->
  <rect x="288" y="164" width="64" height="42" rx="4" fill="#2a2a2a" stroke="#000" stroke-width="1.5"/>
  <!-- Flat side indicator on right -->
  <rect x="348" y="166" width="4" height="38" rx="1" fill="#555"/>
  <text x="320" y="184" text-anchor="middle" fill="#ccc" font-size="8">2N2222</text>
  <text x="320" y="196" text-anchor="middle" fill="#999" font-size="7">Q1 PUL</text>

  <!-- Q1 legs into row e (y=222) -->
  <line x1="300" y1="206" x2="300" y2="222" stroke="#aaa" stroke-width="2"/>
  <line x1="320" y1="206" x2="320" y2="222" stroke="#aaa" stroke-width="2"/>
  <line x1="340" y1="206" x2="340" y2="222" stroke="#aaa" stroke-width="2"/>
  <circle cx="300" cy="222" r="3.5" fill="#e44"/>
  <circle cx="320" cy="222" r="3.5" fill="#e44"/>
  <circle cx="340" cy="222" r="3.5" fill="#e44"/>

  <!-- Q1 pin labels above -->
  <text x="300" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#e44">E</text>
  <text x="320" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#e44">B</text>
  <text x="340" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#e44">C</text>
  <text x="320" y="145" text-anchor="middle" class="label" font-weight="bold">Q1 (PUL)</text>

  <!-- ==================== Q2 (DIR) — cols 17, 18, 19 rows c-d ==================== -->
  <rect x="448" y="164" width="64" height="42" rx="4" fill="#2a2a2a" stroke="#000" stroke-width="1.5"/>
  <rect x="508" y="166" width="4" height="38" rx="1" fill="#555"/>
  <text x="480" y="184" text-anchor="middle" fill="#ccc" font-size="8">2N2222</text>
  <text x="480" y="196" text-anchor="middle" fill="#999" font-size="7">Q2 DIR</text>

  <!-- Q2 legs into row e (y=222) -->
  <line x1="460" y1="206" x2="460" y2="222" stroke="#aaa" stroke-width="2"/>
  <line x1="480" y1="206" x2="480" y2="222" stroke="#aaa" stroke-width="2"/>
  <line x1="500" y1="206" x2="500" y2="222" stroke="#aaa" stroke-width="2"/>
  <circle cx="460" cy="222" r="3.5" fill="#44e"/>
  <circle cx="480" cy="222" r="3.5" fill="#44e"/>
  <circle cx="500" cy="222" r="3.5" fill="#44e"/>

  <!-- Q2 pin labels above -->
  <text x="460" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#44e">E</text>
  <text x="480" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#44e">B</text>
  <text x="500" y="158" text-anchor="middle" class="pin" font-weight="bold" fill="#44e">C</text>
  <text x="480" y="145" text-anchor="middle" class="label" font-weight="bold">Q2 (DIR)</text>

  <!-- ==================== R1 (1K PUL) — cols 7 to 10, row h ==================== -->
  <rect x="248" y="302" width="84" height="16" rx="4" fill="#ffe0a0" stroke="#c90" stroke-width="1.2"/>
  <!-- Color bands -->
  <rect x="262" y="303" width="4" height="14" rx="1" fill="#a52" opacity="0.8"/>
  <rect x="270" y="303" width="4" height="14" rx="1" fill="#222" opacity="0.8"/>
  <rect x="278" y="303" width="4" height="14" rx="1" fill="#e00" opacity="0.8"/>
  <rect x="318" y="303" width="4" height="14" rx="1" fill="#c90" opacity="0.6"/>
  <text x="290" y="332" text-anchor="middle" class="pin" font-weight="bold">R1: 1KΩ</text>
  <!-- R1 leads at col 7 (260) and col 10 (320), row h (309) -->
  <circle cx="260" cy="309" r="3" fill="#e44"/>
  <circle cx="320" cy="309" r="3" fill="#e44"/>

  <!-- ==================== R2 (1K DIR) — cols 15 to 18, row h ==================== -->
  <rect x="408" y="302" width="84" height="16" rx="4" fill="#ffe0a0" stroke="#c90" stroke-width="1.2"/>
  <rect x="422" y="303" width="4" height="14" rx="1" fill="#a52" opacity="0.8"/>
  <rect x="430" y="303" width="4" height="14" rx="1" fill="#222" opacity="0.8"/>
  <rect x="438" y="303" width="4" height="14" rx="1" fill="#e00" opacity="0.8"/>
  <rect x="478" y="303" width="4" height="14" rx="1" fill="#c90" opacity="0.6"/>
  <text x="450" y="332" text-anchor="middle" class="pin" font-weight="bold">R2: 1KΩ</text>
  <circle cx="420" cy="309" r="3" fill="#44e"/>
  <circle cx="480" cy="309" r="3" fill="#44e"/>

  <!-- ==================== WIRES ON BREADBOARD ==================== -->

  <!-- W1: Q1 Emitter col 9 row a → GND rail (top −) -->
  <line x1="300" y1="122" x2="300" y2="95" class="wire-gnd"/>
  <circle cx="300" cy="122" r="3" fill="#333"/>
  <circle cx="300" cy="95" r="3" fill="#333"/>
  <text x="308" y="109" class="pin" fill="#333">W1</text>

  <!-- W2: Q2 Emitter col 17 row a → GND rail (top −) -->
  <line x1="460" y1="122" x2="460" y2="95" class="wire-gnd"/>
  <circle cx="460" cy="122" r="3" fill="#333"/>
  <circle cx="460" cy="95" r="3" fill="#333"/>
  <text x="468" y="109" class="pin" fill="#333">W2</text>

  <!-- W3: Q1 Collector col 11 row a → wire to TB6600 PUL- -->
  <circle cx="340" cy="122" r="3" fill="#e44"/>
  <text x="348" y="132" class="pin" fill="#e44">W3→PUL−</text>

  <!-- W4: Q2 Collector col 19 row a → wire to TB6600 DIR- -->
  <circle cx="500" cy="122" r="3" fill="#44e"/>
  <text x="508" y="132" class="pin" fill="#44e">W4→DIR−</text>

  <!-- W5: GPIO 4 landing at col 7 row j → same column as R1 left end -->
  <circle cx="260" cy="359" r="3" fill="#e44"/>
  <text x="268" y="375" class="pin" fill="#e44">W5←GPIO4</text>

  <!-- W6: GPIO 5 landing at col 15 row j → same column as R2 left end -->
  <circle cx="420" cy="359" r="3" fill="#44e"/>
  <text x="428" y="375" class="pin" fill="#44e">W6←GPIO5</text>

  <!-- W7: ESP32 GND to bottom − rail -->
  <circle cx="200" cy="408" r="3" fill="#333"/>
  <text x="208" y="420" class="pin" fill="#333">W7←GND</text>

  <!-- Jumper: bridge top − rail to bottom − rail (left side) -->
  <line x1="185" y1="95" x2="185" y2="408" class="wire-gnd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="185" cy="95" r="2.5" fill="#333"/>
  <circle cx="185" cy="408" r="2.5" fill="#333"/>
  <text x="178" y="250" text-anchor="end" class="pin" fill="#333">GND bus</text>

  <!-- ==================== EXTERNAL: ESP32 ==================== -->
  <rect x="10" y="260" width="125" height="120" rx="6" fill="#e8f0ff" stroke="#333" stroke-width="1.5"/>
  <text x="72" y="282" text-anchor="middle" font-weight="bold" class="label">ESP32-S3</text>
  <text x="72" y="296" text-anchor="middle" class="note">Pin.OUT mode</text>

  <text x="122" y="318" text-anchor="end" class="pin">GPIO 4</text>
  <circle cx="135" cy="315" r="4" fill="#e44"/>
  <text x="122" y="340" text-anchor="end" class="pin">GPIO 5</text>
  <circle cx="135" cy="337" r="4" fill="#44e"/>
  <text x="122" y="365" text-anchor="end" class="pin">GND</text>
  <circle cx="135" cy="362" r="4" fill="#333"/>

  <!-- GPIO 4 → col 7 row j -->
  <polyline points="139,315 200,315 200,359 256,359" class="wire-pul"/>

  <!-- GPIO 5 → col 15 row j -->
  <polyline points="139,337 195,337 195,380 420,380 420,359" class="wire-dir"/>

  <!-- ESP32 GND → bottom − rail -->
  <polyline points="139,362 155,362 155,408 196,408" class="wire-gnd"/>

  <!-- ==================== EXTERNAL: TB6600 ==================== -->
  <rect x="720" y="80" width="170" height="300" rx="6" fill="#f0f0f8" stroke="#333" stroke-width="2"/>
  <text x="805" y="105" text-anchor="middle" font-weight="bold" font-size="14">TB6600</text>
  <text x="805" y="120" text-anchor="middle" class="note">Stepper Driver</text>

  <text x="740" y="155" class="pin">PUL+</text>
  <circle cx="730" cy="152" r="4" fill="#e80"/>
  <text x="740" y="180" class="pin">PUL−</text>
  <circle cx="730" cy="177" r="4" fill="#e44"/>

  <text x="740" y="215" class="pin">DIR+</text>
  <circle cx="730" cy="212" r="4" fill="#e80"/>
  <text x="740" y="240" class="pin">DIR−</text>
  <circle cx="730" cy="237" r="4" fill="#44e"/>

  <text x="740" y="280" class="pin">ENA+</text>
  <circle cx="730" cy="277" r="4" fill="#aaa"/>
  <text x="740" y="305" class="pin">ENA−</text>
  <circle cx="730" cy="302" r="4" fill="#aaa"/>
  <text x="805" y="325" text-anchor="middle" class="note" fill="#999">not connected</text>

  <text x="805" y="355" text-anchor="middle" class="note">Motor: A+(BLK) A−(GRN)</text>
  <text x="805" y="368" text-anchor="middle" class="note">B+(RED) B−(BLU)</text>

  <!-- ==================== EXTERNAL: USB 5V ==================== -->
  <rect x="720" y="405" width="170" height="50" rx="6" fill="#fff3e0" stroke="#e80" stroke-width="1.5"/>
  <text x="805" y="428" text-anchor="middle" font-weight="bold" class="label">USB 5V Charger</text>
  <text x="805" y="443" text-anchor="middle" class="note">External power source</text>

  <!-- 5V → PUL+ and DIR+ -->
  <polyline points="720,420 695,420 695,152 726,152" class="wire-5v"/>
  <line x1="695" y1="212" x2="726" y2="212" class="wire-5v"/>
  <text x="700" y="185" class="pin" fill="#e80">5V</text>

  <!-- USB GND → bottom − rail on breadboard -->
  <polyline points="720,440 680,440 680,408 660,408" class="wire-gnd"/>
  <circle cx="660" cy="408" r="3" fill="#333"/>
  <text x="668" y="420" class="pin" fill="#333">USB GND</text>

  <!-- Q1 Collector wire to PUL- -->
  <polyline points="340,122 340,55 685,55 685,177 726,177" class="wire-pul"/>

  <!-- Q2 Collector wire to DIR- -->
  <polyline points="500,122 500,42 675,42 675,237 726,237" class="wire-dir"/>

  <!-- ==================== TRANSISTOR PINOUT REFERENCE ==================== -->
  <rect x="10" y="480" width="320" height="160" rx="6" fill="#e8f4e8" stroke="#2a2" stroke-width="1"/>
  <text x="170" y="502" text-anchor="middle" font-weight="bold" class="label">2N2222 Pinout — Legs Facing You</text>

  <!-- TOP VIEW: D-shaped package -->
  <text x="100" y="524" text-anchor="middle" class="pin" fill="#555">TOP VIEW</text>

  <!-- D-shaped body: semicircle on left, flat on right -->
  <!-- Round side (left arc) -->
  <path d="M 120,535 A 25,25 0 0,0 120,585 L 120,585 L 145,585 L 145,535 Z" fill="#2a2a2a" stroke="#000" stroke-width="1.5"/>
  <!-- Flat side (right) - visible flat edge -->
  <line x1="145" y1="535" x2="145" y2="585" stroke="#888" stroke-width="3"/>
  <text x="155" y="563" fill="#888" font-size="9">flat</text>

  <!-- Dot/tab marker at top-left -->
  <circle cx="118" cy="542" r="3" fill="#666"/>

  <text x="100" y="600" text-anchor="middle" fill="#aaa" font-size="8">2N2222</text>

  <!-- FRONT VIEW: legs facing you, flat side back -->
  <text x="250" y="524" text-anchor="middle" class="pin" fill="#555">FRONT VIEW (legs toward you)</text>

  <!-- D-shaped body front: rounded top, flat bottom -->
  <path d="M 220,540 A 30,18 0 0,1 280,540 L 280,575 L 220,575 Z" fill="#2a2a2a" stroke="#000" stroke-width="1.5"/>
  <!-- Flat bottom edge emphasized -->
  <line x1="220" y1="575" x2="280" y2="575" stroke="#888" stroke-width="2.5"/>
  <text x="250" y="563" text-anchor="middle" fill="#aaa" font-size="8">2N2222</text>
  <text x="250" y="588" text-anchor="middle" fill="#888" font-size="8">↑ flat side (back)</text>

  <!-- Legs coming down from bottom -->
  <line x1="235" y1="575" x2="235" y2="605" stroke="#aaa" stroke-width="2.5"/>
  <line x1="250" y1="575" x2="250" y2="605" stroke="#aaa" stroke-width="2.5"/>
  <line x1="265" y1="575" x2="265" y2="605" stroke="#aaa" stroke-width="2.5"/>

  <text x="235" y="620" text-anchor="middle" font-weight="bold" font-size="12" fill="#c00">E</text>
  <text x="250" y="620" text-anchor="middle" font-weight="bold" font-size="12" fill="#c00">B</text>
  <text x="265" y="620" text-anchor="middle" font-weight="bold" font-size="12" fill="#c00">C</text>

  <text x="235" y="635" text-anchor="middle" class="pin">GND</text>
  <text x="250" y="635" text-anchor="middle" class="pin">1K</text>
  <text x="265" y="635" text-anchor="middle" class="pin">TB6600</text>

  <!-- ==================== WIRE LIST ==================== -->
  <rect x="320" y="480" width="370" height="130" rx="6" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="335" y="500" font-weight="bold" class="label">Wire Checklist:</text>

  <text x="335" y="518" class="pin">W1: Q1 Emitter (col 9 row a) → top GND rail (−)</text>
  <text x="335" y="533" class="pin">W2: Q2 Emitter (col 17 row a) → top GND rail (−)</text>
  <text x="335" y="548" class="pin">W3: Q1 Collector (col 11 row a) → TB6600 PUL−</text>
  <text x="335" y="563" class="pin">W4: Q2 Collector (col 19 row a) → TB6600 DIR−</text>
  <text x="335" y="578" class="pin">W5: ESP32 GPIO 4 → col 7 row j (R1 left)</text>
  <text x="335" y="593" class="pin">W6: ESP32 GPIO 5 → col 15 row j (R2 left)</text>
  <text x="335" y="608" class="pin">W7: ESP32 GND → bottom GND rail (−)</text>

  <!-- ==================== SIGNAL FLOW ==================== -->
  <rect x="10" y="625" width="680" height="45" rx="4" fill="#fff8e8" stroke="#cc0" stroke-width="1"/>
  <text x="20" y="642" font-weight="bold" class="label">Signal Flow:</text>
  <text x="20" y="658" class="note">GPIO HIGH → 1K resistor → base current → NPN ON → collector pulls PUL−/DIR− to GND → 5V across opto → step/dir pulse</text>
</svg>